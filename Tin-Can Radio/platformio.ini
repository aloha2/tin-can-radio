; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = seeed_xiao_esp32c3

[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library

[env:seeed_xiao_esp32c3]
build_flags =
  -D BRINGUP_STAGE=1
  -D OLED_ADDR=0x3C
  -D TEST_FREQ_MHZ=101.7
  -D RDA_VOLUME=2

[env:stage2_i2c_scan]
build_flags =
  -D BRINGUP_STAGE=2
  -D OLED_ADDR=0x3C
  -D TEST_FREQ_MHZ=101.7
  -D RDA_VOLUME=2

[env:stage3_oled_test]
build_flags =
  -D BRINGUP_STAGE=3
  -D OLED_ADDR=0x3C
  -D TEST_FREQ_MHZ=101.7
  -D RDA_VOLUME=2

[env:stage4_radio_test]
build_flags =
  -D BRINGUP_STAGE=4
  -D OLED_ADDR=0x3C
  -D TEST_FREQ_MHZ=101.7
  -D RDA_VOLUME=2

[env:stage5_radio_sweep]
build_flags =
  -D BRINGUP_STAGE=5
  -D OLED_ADDR=0x3C
  -D TEST_FREQ_MHZ=101.7
  -D RDA_VOLUME=3
  -D SWEEP_START_MHZ=87.5
  -D SWEEP_END_MHZ=108.0
  -D SWEEP_STEP_MHZ=0.2
  -D SWEEP_DWELL_MS=1600

[env:stage6_encoder_radio]
build_flags =
  -D BRINGUP_STAGE=6
  -D OLED_ADDR=0x3C
  -D TEST_FREQ_MHZ=101.7
  -D RDA_VOLUME=2
  -D TUNE_STEP_MHZ=0.1
  -D ENCODER_REVERSE=0
